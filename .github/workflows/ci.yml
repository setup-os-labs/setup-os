name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check repository shape
        run: |
          test -f README.md
          test -f TASKS.md
          test -f CHANGELOG.md
          test -f CODEX.md

      - name: Run tests when present
        run: |
          if find tests -name "test_*.py" -print -quit | grep -q .; then
            python -m unittest discover -s tests
          else
            echo "No tests yet."
          fi

  desktop-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Typecheck
        working-directory: apps/desktop
        run: npm run typecheck

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Audit dependencies
        working-directory: apps/desktop
        run: npm audit --audit-level=moderate

  desktop-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: tauri-native

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build desktop native shell
        working-directory: apps/desktop
        run: npm run tauri -- build --no-bundle --ci

  checks:
    runs-on: ubuntu-latest
    needs:
      - python
      - desktop-frontend
      - desktop-native
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          test "${{ needs.python.result }}" = "success"
          test "${{ needs.desktop-frontend.result }}" = "success"
          test "${{ needs.desktop-native.result }}" = "success"
