name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check repository shape
        run: |
          test -f README.md
          test -f TASKS.md
          test -f CHANGELOG.md
          test -f CODEX.md

      - name: Run tests when present
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            echo "No tests yet."
          fi
