name: Desktop Release Build

on:
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-release:
    name: desktop-release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: tauri-release-${{ matrix.os }}

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build unsigned desktop bundle
        working-directory: apps/desktop
        run: npm run tauri -- build --ci

      - name: Smoke-check packaged artifacts
        working-directory: apps/desktop
        run: python ../../scripts/smoke_packaged_artifact.py src-tauri/target/release/bundle --platform ${{ runner.os }} --output packaged-smoke-manifest.json

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: setup-os-desktop-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            apps/desktop/packaged-smoke-manifest.json
          if-no-files-found: error
